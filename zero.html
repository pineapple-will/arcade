// === LEADERBOARD (localStorage - per-device) ===
const LB_KEY = 'zero-leaderboard-v1';
function loadLeaderboard(){
  try {
    const raw = localStorage.getItem(LB_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e){ return []; }
}
function saveScore(name, time, d){
  let lb = loadLeaderboard();
  lb.push({name:name, time:time, deaths:d, date:Date.now()});
  lb.sort((a,b)=>a.time-b.time);
  const top50 = lb.slice(0,50);
  try {
    localStorage.setItem(LB_KEY, JSON.stringify(top50));
  } catch(e){ console.error('localStorage save failed:', e); }
  return top50;
}
function renderLeaderboard(lb, myTime){
  lbRows.innerHTML='';
  if(!lb.length){ lbRows.innerHTML='<div style="color:#aaa;text-align:center;font-size:12px">No scores yet</div>'; return; }
  lb.forEach((entry,i)=>{
    const row=document.createElement('div');
    const isYou = Math.abs(entry.time-myTime)<0.001 && entry.name===playerName;
    row.className='lb-row'+(isYou?' you':'');
    row.innerHTML=`<span class="lb-rank">${i+1}.</span><span class="lb-name">${entry.name}</span><span class="lb-time">${entry.time.toFixed(3)}s</span><span class="lb-deaths">${entry.deaths}d</span>`;
    lbRows.appendChild(row);
  });
}
function showFinishScreen(){
  finishStats.textContent=elapsed.toFixed(3)+'s';
  finishDeaths.textContent='Deaths: '+deaths;
  finishScreen.style.display='flex';
  if(!scoreSaved){
    scoreSaved=true;
    const lb=saveScore(playerName, elapsed, deaths);
    renderLeaderboard(lb, elapsed);
  }
}

function startNameEntry(){
  titleScreen.style.opacity='0';
  setTimeout(()=>{
    titleScreen.style.display='none';
    nameScreen.style.display='flex';
    nameInput.focus();
  },500);
}
function confirmName(){
  const n=nameInput.value.trim().toUpperCase();
  if(!n) return;
  playerName=n;
  nameScreen.style.display='none';
  gameState='playing';
}
nameGo.addEventListener('click', confirmName);
nameInput.addEventListener('keydown', e=>{
  e.stopPropagation();
  if(e.code==='Enter') confirmName();
});
finishRestart.addEventListener('click', ()=>{
  finishScreen.style.display='none';
  checkpoint={x:SPAWN.x,y:SPAWN.y};
  collectedStars=new Set();
  respawn();
  timerStarted=false; elapsed=0; deaths=0; scoreSaved=false;
  timerEl.textContent='0.000';
  deathsEl.textContent='Deaths: 0';
  gameState='playing';
});

// === HINTS ===
const HINTS = [
  {x:1400*S,y:2350*S,text:isMobile?'Use the buttons to move + jump':'WASD / ARROWS + SPACE to move'},
  {x:2300*S,y:2470*S,text:'SPIKES are bum'},
  {x:2700*S,y:2250*S,text:'JUMP on a WALL to walljump'},
  {x:3420*S,y:2920*S,text:isMobile?'Tap R to reset':'R to reset'},
  {x:3600*S,y:1960*S,text:'ICE is VERY slippery'},
  {x:5100*S,y:2030*S,text:'ROTATING SAWS are bum as well'},
  {x:5950*S,y:1820*S,text:'This way ->'},
  {x:9200*S,y:1860*S,text:'wow ur so smart'},
  {x:6100*S,y:2880*S,text:'Black spikes ON blue ice. Nice.'},
  {x:6750*S,y:2620*S,text:'Tiny platforms ahead. Good luck.'},
  {x:7450*S,y:3780*S,text:'SAWS + LAVA. Have fun!'},
  {x:8333*S,y:3540*S,text:'WIN HERE'},
  {x:4550*S,y:3260*S,text:'<- That way'},
  {x:3650*S,y:3660*S,text:'PORTAL does what you think'},
  {x:4150*S,y:3880*S,text:'LAVA bad'},
  {x:4950*S,y:3860*S,text:'HA ur bum'},
];

// === INPUT ===
window.addEventListener('keydown', e=>{
  keys[e.code] = true;
  if(gameState==='title'){
    startNameEntry();
  }
  if(e.code==='KeyR' && gameState!=='title'){
    finishScreen.style.display='none';
    checkpoint = {x:SPAWN.x, y:SPAWN.y};
    collectedStars = new Set();
    respawn();
    timerStarted=false; elapsed=0; deaths=0; scoreSaved=false;
    timerEl.textContent='0.000';
    deathsEl.textContent='Deaths: 0';

  }
  e.preventDefault();
});
window.addEventListener('keyup', e=>{ keys[e.code]=false; });

// === TOUCH INPUT ===
titleScreen.addEventListener('touchstart', e=>{ e.preventDefault(); startNameEntry(); });

function resetGame(){
  finishScreen.style.display='none';
  checkpoint = {x:SPAWN.x, y:SPAWN.y};
  collectedStars = new Set();
  respawn();
  timerStarted=false; elapsed=0; deaths=0; scoreSaved=false;
  timerEl.textContent='0.000';
  deathsEl.textContent='Deaths: 0';
  if(gameState==='finished') gameState='playing';
}

const btnLeft = document.getElementById('btn-left');
const btnRight = document.getElementById('btn-right');
const btnJump = document.getElementById('btn-jump');
const btnRestart = document.getElementById('btn-restart');

function touchBtn(btn, keyCode){
  btn.addEventListener('touchstart', e=>{ e.preventDefault(); keys[keyCode]=true; btn.classList.add('active'); });
  btn.addEventListener('touchend', e=>{ e.preventDefault(); keys[keyCode]=false; btn.classList.remove('active'); });
  btn.addEventListener('touchcancel', e=>{ keys[keyCode]=false; btn.classList.remove('active'); });
}
touchBtn(btnLeft, 'ArrowLeft');
touchBtn(btnRight, 'ArrowRight');
touchBtn(btnJump, 'Space');
btnRestart.addEventListener('touchstart', e=>{ e.preventDefault(); resetGame(); });
btnRestart.addEventListener('click', resetGame);

// Prevent scrolling/zooming on mobile
document.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});

// === HELPERS ===
function rectCollide(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
function circleRect(cx,cy,cr,rx,ry,rw,rh){
  const nx=Math.max(rx,Math.min(cx,rx+rw));
  const ny=Math.max(ry,Math.min(cy,ry+rh));
  const dx=cx-nx,dy=cy-ny;
  return dx*dx+dy*dy<cr*cr;
}

function respawn(){
  deaths++;
  deathsEl.textContent='Deaths: '+deaths;
  player.x=checkpoint.x; player.y=checkpoint.y;
  player.vx=0; player.vy=0;
  player.onGround=false; player.onWall=0;
  portalCooldown=0;
}

// === UPDATE ===
function update(){
  if(gameState!=='playing') return;

  const left  = keys['ArrowLeft']  || keys['KeyA'];
  const right = keys['ArrowRight'] || keys['KeyD'];
  const jump  = keys['ArrowUp']    || keys['KeyW'] || keys['Space'];

  if(!timerStarted && (left||right||jump)){
    timerStarted=true; startTime=performance.now();
  }

  // Ice check
  const onIce = player.onGround && BLUE_PLATFORMS.some(p=>
    rectCollide(player.x, player.y+PH, PW, 2, p.x, p.y, p.w, p.h)
  );

  if(onIce){
    // VERY slippery
    const ICE_ACCEL = 0.06;
    const ICE_FRIC  = 0.998;
    const ICE_MAX   = MOVE_SPEED * 2.5;
    if(left)       player.vx -= ICE_ACCEL;
    else if(right) player.vx += ICE_ACCEL;
    else           player.vx *= ICE_FRIC;
    player.vx = Math.max(-ICE_MAX, Math.min(ICE_MAX, player.vx));
    if(Math.abs(player.vx) < 0.02 && !left && !right) player.vx = 0;
  } else if(player.onGround) {
    // Normal ground: direct control
    if(left)       player.vx = -MOVE_SPEED;
    else if(right) player.vx =  MOVE_SPEED;
    else           player.vx = 0;
  } else {
    // In the air: keep momentum, allow slight steering
    if(left)       player.vx = Math.max(player.vx - 0.3, -MOVE_SPEED);
    else if(right) player.vx = Math.min(player.vx + 0.3,  MOVE_SPEED);
    // no zeroing in air — momentum carries through
  }

  // Wall jump momentum decay
  if(player.wallJumpDir !== 0){
    player.vx = player.wallJumpDir * WALL_JUMP_X;
    player.wallJumpDir *= 0.95;
    if(Math.abs(player.wallJumpDir) < 0.1) player.wallJumpDir = 0;
  }

  // Gravity / wall slide
  const sliding = player.onWall && player.vy>0 &&
    ((left && player.onWall===-1) || (right && player.onWall===1));
  if(sliding){
    player.vy += GRAVITY;
    if(player.vy > WALL_SLIDE_SPEED) player.vy = WALL_SLIDE_SPEED;
  } else {
    player.vy += GRAVITY;
    if(player.vy > 13) player.vy = 13;
  }

  // Jump
  if(jump && player.canJump){
    if(player.onGround){
      player.vy = JUMP_FORCE; player.canJump = false;
    } else if(player.onWall !== 0){
      player.vy = WALL_JUMP_Y;
      player.wallJumpDir = -player.onWall;
      player.canJump = false;
    }
  }
  if(!jump) player.canJump = true;

  // Move X
  player.x += player.vx;
  player.onWall = 0;
  for(const s of SOLIDS){
    if(rectCollide(player.x,player.y,PW,PH,s.x,s.y,s.w,s.h)){
      if(player.vx>0){ player.x=s.x-PW; player.onWall=1; }
      else            { player.x=s.x+s.w; player.onWall=-1; }
      player.vx=0;
    }
  }

  // Move Y
  player.y += player.vy;
  player.onGround = false;
  for(const s of SOLIDS){
    if(rectCollide(player.x,player.y,PW,PH,s.x,s.y,s.w,s.h)){
      if(player.vy>0){ player.y=s.y-PH; player.onGround=true; }
      else            { player.y=s.y+s.h; }
      player.vy=0;
    }
  }

  // Wall touch
  if(!player.onGround){
    for(const s of SOLIDS){
      if(rectCollide(player.x-1,player.y,PW,PH,s.x,s.y,s.w,s.h) && left)  player.onWall=-1;
      if(rectCollide(player.x+1,player.y,PW,PH,s.x,s.y,s.w,s.h) && right) player.onWall=1;
    }
  }

  // Spike kills
  for(const k of KILL_ZONES){
    if(rectCollide(player.x,player.y,PW,PH,k.x,k.y,k.w,k.h)){ respawn(); return; }
  }

  // Saw kills
  for(const saw of SAWS){
    if(circleRect(saw.x,saw.y,saw.r,player.x,player.y,PW,PH)){ respawn(); return; }
  }

  // Lava / fall out
  if(player.y+PH > LAVA.y || player.y > 4557*S){ respawn(); return; }

  // Portal
  if(portalCooldown>0) portalCooldown--;
  if(portalCooldown===0){
    const pcx=player.x+PW/2, pcy=player.y+PH/2;
    if(Math.abs(pcx-PORTAL_A.x)<PORTAL_A.rx*1.2 && Math.abs(pcy-PORTAL_A.y)<PORTAL_A.ry*1.2){
      player.x=PORTAL_B.x+PORTAL_B.rx+5; player.y=PORTAL_B.y-PH/2;
      player.vx=0; player.vy=0; portalCooldown=30;
      portalOverlay.style.opacity='1';
      setTimeout(()=>portalOverlay.style.opacity='0',150);
    } else if(Math.abs(pcx-PORTAL_B.x)<PORTAL_B.rx*1.2 && Math.abs(pcy-PORTAL_B.y)<PORTAL_B.ry*1.2){
      player.x=PORTAL_A.x+PORTAL_A.rx+5; player.y=PORTAL_A.y-PH/2;
      player.vx=0; player.vy=0; portalCooldown=30;
      portalOverlay.style.opacity='1';
      setTimeout(()=>portalOverlay.style.opacity='0',150);
    }
  }

  // Finish
  const fcx=player.x+PW/2, fcy=player.y+PH/2;
  const fdx=fcx-FINISH.x, fdy=fcy-FINISH.y;
  if(fdx*fdx+fdy*fdy < FINISH.r*FINISH.r && gameState!=='finished'){ gameState='finished'; showFinishScreen(); }

  // Checkpoint stars
  for(let i=0;i<STARS.length;i++){
    if(collectedStars.has(i)) continue;
    const st=STARS[i];
    const dx=fcx-st.x, dy=fcy-st.y;
    if(dx*dx+dy*dy < (28*S)*(28*S)){
      collectedStars.add(i);
      checkpoint = {x:st.x - PW/2, y:st.y - PH};
    }
  }

  if(timerStarted && gameState==='playing'){
    elapsed=(performance.now()-startTime)/1000;
    timerEl.textContent=elapsed.toFixed(3);
  }

  for(let i=0;i<SAWS.length;i++) sawAngles[i]+=0.06;
}

// === DRAW ===
const ZOOM = 1.6;
function draw(){
  const targetCX = player.x+PW/2-VW/(2*ZOOM);
  const targetCY = player.y+PH/2-VH/(2*ZOOM);
  camera.x += (targetCX-camera.x)*0.06;
  camera.y += (targetCY-camera.y)*0.06;
  const worldW=11854*S, worldH=4557*S;
  camera.x = Math.max(0,Math.min(camera.x,worldW-VW/ZOOM));
  camera.y = Math.max(0,Math.min(camera.y,worldH-VH/ZOOM));

  ctx.fillStyle='#FFFEFE';
  ctx.fillRect(0,0,VW,VH);

  ctx.save();
  ctx.scale(ZOOM, ZOOM);
  ctx.translate(-camera.x,-camera.y);

  const t = performance.now()/1000;

  // Lava
  ctx.fillStyle='#FF2F2F';
  ctx.fillRect(LAVA.x,LAVA.y,LAVA.w,LAVA.h);
  ctx.fillStyle='#FF6633';
  for(let i=0;i<20;i++){
    const bx=(i*593+t*30*(i%3+1))%LAVA.w;
    const by=LAVA.y+5+Math.sin(t*2+i)*8;
    const br=3+Math.sin(t*3+i*2)*2;
    ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.fill();
  }

  // Platforms
  for(const p of PLATFORMS){
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.fillRect(p.x+2,p.y+2,p.w,p.h);
    ctx.fillStyle='#000';
    ctx.fillRect(p.x,p.y,p.w,p.h);
  }
  // Blue spikes drawn FIRST so platform covers their bases
  ctx.fillStyle='#6BAFEA';
  for(const s of BLUE_SPIKES){
    ctx.beginPath();
    ctx.moveTo(s.x-s.w/2,s.y);
    ctx.lineTo(s.x+s.w/2,s.y);
    ctx.lineTo(s.x,s.y+s.h);
    ctx.closePath(); ctx.fill();
  }
  for(const p of BLUE_PLATFORMS){
    ctx.fillStyle='rgba(107,175,234,0.3)';
    ctx.fillRect(p.x+2,p.y+2,p.w,p.h);
    ctx.fillStyle='#6BAFEA';
    ctx.fillRect(p.x,p.y,p.w,p.h);
  }
  for(const w of WALLS){
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.fillRect(w.x+2,w.y+2,w.w,w.h);
    ctx.fillStyle='#000';
    ctx.fillRect(w.x,w.y,w.w,w.h);
  }

  // Green stars (checkpoints)
  for(let i=0;i<STARS.length;i++){
    const st=STARS[i];
    const collected=collectedStars.has(i);
    const pulse=collected?1:0.75+Math.sin(t*4+i*2)*0.25;
    const r=16*S*pulse, inner=r*0.4, n=5;
    ctx.fillStyle=collected?'rgba(0,255,34,0.35)':'#00FF22';
    if(collected){
      // dim ring only
      ctx.beginPath();ctx.arc(st.x,st.y,r*1.3,0,Math.PI*2);ctx.fill();
    } else {
      ctx.beginPath();
      for(let j=0;j<n*2;j++){
        const a=(j*Math.PI/n)-Math.PI/2;
        const rad=j%2===0?r:inner;
        j===0?ctx.moveTo(st.x+Math.cos(a)*rad,st.y+Math.sin(a)*rad):ctx.lineTo(st.x+Math.cos(a)*rad,st.y+Math.sin(a)*rad);
      }
      ctx.closePath();ctx.fill();
    }
  }

  // Black spikes
  ctx.fillStyle='#000';
  for(const s of SPIKE_TRIS){
    ctx.beginPath();
    if(s.dir==='up'){
      ctx.moveTo(s.x,s.y);
      ctx.lineTo(s.x-s.w/2,s.y+s.h);
      ctx.lineTo(s.x+s.w/2,s.y+s.h);
    } else if(s.dir==='down'){
      ctx.moveTo(s.x,s.y+s.h);
      ctx.lineTo(s.x-s.w/2,s.y);
      ctx.lineTo(s.x+s.w/2,s.y);
    } else if(s.dir==='left'){
      ctx.moveTo(s.x,s.y);
      ctx.lineTo(s.x+s.w,s.y-s.h/2);
      ctx.lineTo(s.x+s.w,s.y+s.h/2);
    } else if(s.dir==='right'){
      ctx.moveTo(s.x+s.w,s.y);
      ctx.lineTo(s.x,s.y-s.h/2);
      ctx.lineTo(s.x,s.y+s.h/2);
    }
    ctx.closePath(); ctx.fill();
  }

  // Saws
  for(let i=0;i<SAWS.length;i++){
    const saw=SAWS[i];
    ctx.save();
    ctx.translate(saw.x,saw.y);
    ctx.rotate(sawAngles[i]);
    ctx.fillStyle='#000';
    ctx.beginPath();
    const teeth=12;
    for(let j=0;j<teeth;j++){
      const a1=(j/teeth)*Math.PI*2;
      const a2=((j+0.5)/teeth)*Math.PI*2;
      ctx.lineTo(Math.cos(a1)*saw.r, Math.sin(a1)*saw.r);
      ctx.lineTo(Math.cos(a2)*saw.r*0.7, Math.sin(a2)*saw.r*0.7);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // Portals
  const pp=0.8+Math.sin(t*3)*0.2;
  [PORTAL_A,PORTAL_B].forEach(p=>{
    ctx.save(); ctx.translate(p.x,p.y);
    ctx.fillStyle='rgba(82,89,213,0.2)';
    ctx.beginPath(); ctx.ellipse(0,0,p.rx*1.5*pp,p.ry*1.3*pp,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#5259D5';
    ctx.beginPath(); ctx.ellipse(0,0,p.rx,p.ry,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#7B80E8';
    ctx.beginPath(); ctx.ellipse(0,0,p.rx*0.5,p.ry*0.6,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Finish circle
  const fp=1+Math.sin(t*4)*0.15;
  ctx.fillStyle='rgba(71,245,74,0.15)';
  ctx.beginPath(); ctx.arc(FINISH.x,FINISH.y,FINISH.r*2*fp,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#47F54A';
  ctx.beginPath(); ctx.arc(FINISH.x,FINISH.y,FINISH.r,0,Math.PI*2); ctx.fill();

  // Hint texts
  // Hint texts — fade in when close, fade out when far
  ctx.font = 'bold 18px Courier New';
  ctx.textAlign = 'center';
  const HINT_FADE_START = 400;
  const HINT_FADE_END = 150;
  const pcx = player.x + PW/2, pcy = player.y + PH/2;
  for(const h of HINTS){
    const dist = Math.sqrt((pcx-h.x)**2 + (pcy-h.y)**2);
    const alpha = Math.max(0, Math.min(1, (HINT_FADE_START - dist) / (HINT_FADE_START - HINT_FADE_END)));
    if(alpha <= 0) continue;
    ctx.fillStyle = `rgba(0,0,0,${alpha * 0.45})`;
    ctx.fillText(h.text, h.x, h.y);
  }

  // Player
  ctx.fillStyle='#D9D9D9';
  ctx.fillRect(player.x,player.y,PW,PH);
  ctx.strokeStyle='#999'; ctx.lineWidth=0.5;
  ctx.strokeRect(player.x,player.y,PW,PH);

  ctx.restore();

}

function gameLoop(){ update(); draw(); requestAnimationFrame(gameLoop); }
gameLoop();
</script>
