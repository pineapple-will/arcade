<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" preserveAspectRatio="xMidYMid slice">
  <!-- Background -->
  <rect width="1600" height="600" fill="#FFFEFE"/>

  <!-- Subtle grid texture -->
  <g opacity="0.035">
    <path d="M0,150 L1600,150 M0,300 L1600,300 M0,450 L1600,450" stroke="#000" stroke-width="1"/>
    <path d="M200,0 L200,600 M400,0 L400,600 M600,0 L600,600 M800,0 L800,600 M1000,0 L1000,600 M1200,0 L1200,600 M1400,0 L1400,600" stroke="#000" stroke-width="1"/>
  </g>

  <!-- Giant ZERO title -->
  <text x="80" y="340" font-family="'Courier New', monospace" font-weight="900" font-size="280" fill="#000" letter-spacing="-8">ZERO</text>

  <!-- Subtitle -->
  <text x="88" y="400" font-family="'Courier New', monospace" font-size="20" fill="#888" letter-spacing="8">A PRECISION PLATFORMER</text>

  <!-- Tagline -->
  <text x="88" y="440" font-family="'Courier New', monospace" font-size="16" fill="#000">How fast can you reach ZERO?</text>

  <!-- Gameplay scene on right side -->

  <!-- Ground platform -->
  <rect x="950" y="470" width="620" height="30" fill="#000"/>
  <rect x="952" y="472" width="620" height="30" fill="#000" opacity="0.3"/>

  <!-- Upper platform -->
  <rect x="1120" y="330" width="180" height="30" fill="#000"/>

  <!-- Wall -->
  <rect x="1420" y="280" width="30" height="190" fill="#000"/>

  <!-- Spikes on ground platform -->
  <g fill="#000">
    <polygon points="1000,470 1017,432 1034,470"/>
    <polygon points="1040,470 1057,432 1074,470"/>
    <polygon points="1080,470 1097,432 1114,470"/>
  </g>

  <!-- Ceiling spikes hanging -->
  <g fill="#000">
    <polygon points="1160,360 1177,398 1194,360"/>
    <polygon points="1200,360 1217,398 1234,360"/>
    <polygon points="1240,360 1257,398 1274,360"/>
  </g>

  <!-- Blue ice platform -->
  <rect x="1320" y="400" width="80" height="20" fill="#6BAFEA"/>

  <!-- Blue ice hanging spikes -->
  <g fill="#6BAFEA">
    <polygon points="1330,420 1340,455 1350,420"/>
    <polygon points="1360,420 1370,460 1380,420"/>
  </g>

  <!-- Saw (gear) -->
  <g transform="translate(1490, 410)" fill="#000">
    <circle r="34"/>
    <g>
      <polygon points="0,-42 -6,-30 6,-30"/>
      <polygon points="0,42 -6,30 6,30"/>
      <polygon points="-42,0 -30,-6 -30,6"/>
      <polygon points="42,0 30,-6 30,6"/>
      <polygon points="-30,-30 -20,-26 -26,-20"/>
      <polygon points="30,30 20,26 26,20"/>
      <polygon points="-30,30 -20,26 -26,20"/>
      <polygon points="30,-30 20,-26 26,-20"/>
    </g>
  </g>

  <!-- Green star (checkpoint) -->
  <g transform="translate(1180, 290)" fill="#00FF22">
    <polygon points="0,-18 5,-5 18,-5 8,4 12,18 0,10 -12,18 -8,4 -18,-5 -5,-5"/>
  </g>

  <!-- Player cube (mid-jump) -->
  <g>
    <rect x="1050" y="380" width="32" height="32" fill="#D9D9D9" stroke="#888" stroke-width="1"/>
    <!-- Motion trail -->
    <rect x="1030" y="395" width="18" height="20" fill="#D9D9D9" opacity="0.25"/>
    <rect x="1012" y="408" width="12" height="14" fill="#D9D9D9" opacity="0.12"/>
  </g>

  <!-- Small finish circle -->
  <circle cx="1560" cy="260" r="22" fill="#47F54A" opacity="0.2"/>
  <circle cx="1560" cy="260" r="14" fill="#47F54A"/>

  <!-- Decorative timer stat on bottom left -->
  <g opacity="0.5">
    <text x="90" y="520" font-family="'Courier New', monospace" font-size="14" fill="#000" letter-spacing="2">WALLJUMP · PORTALS · ICE · SAWS · LAVA</text>
  </g>
</svg>
