<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boofy Dog — Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --border: #E8E8E4;
    --border-hover: #D0D0CC;
    --text-primary: #1A1A1A;
    --text-secondary: #6B6B6B;
    --text-tertiary: #9A9A9A;
    --accent: #2A2A2A;
    --accent-warm: #C4663A;
    --accent-warm-light: #FFF4EF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px;
  }

  nav {
    padding: 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: var(--text-primary);
  }

  .nav-logo { width: 36px; height: 36px; }

  .nav-name {
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.3px;
  }

  .nav-links {
    display: flex;
    gap: 28px;
    list-style: none;
  }

  .nav-links a {
    text-decoration: none;
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 500;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--text-primary); }

  .hero {
    text-align: center;
    padding: 80px 0 60px;
    border-bottom: 1px solid var(--border);
  }

  .hero-mascot {
    width: 120px;
    height: 120px;
    margin: 0 auto 28px;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 6vw, 56px);
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1.1;
    color: var(--text-primary);
    margin-bottom: 16px;
  }

  .hero p {
    font-size: 17px;
    color: var(--text-secondary);
    max-width: 440px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .section-label {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 48px 0 28px;
  }

  .section-label span {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-tertiary);
    white-space: nowrap;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    padding-bottom: 80px;
  }

  .game-card {
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
  }

  .game-card:hover {
    border-color: var(--border-hover);
    box-shadow: 0 8px 32px rgba(0,0,0,0.06);
    transform: translateY(-3px);
  }

  .game-thumb {
    width: 100%;
    aspect-ratio: 16/10;
    background: linear-gradient(145deg, #F5F5F2, #EDEDEA);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .game-thumb-icon { font-size: 44px; opacity: 0.5; }

  .game-tag {
    position: absolute;
    top: 12px;
    left: 12px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent-warm);
    background: var(--accent-warm-light);
    padding: 4px 10px;
    border-radius: 6px;
  }

  .game-info { padding: 18px 20px 22px; }

  .game-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }

  .game-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.55;
    margin-bottom: 16px;
  }

  .play-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 10px 22px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }

  .play-btn:hover { background: #444; transform: scale(1.03); }
  .play-btn svg { width: 12px; height: 12px; fill: #fff; }

  .empty-state {
    text-align: center;
    padding: 60px 20px 100px;
  }

  .empty-state p {
    color: var(--text-tertiary);
    font-size: 15px;
    line-height: 1.6;
  }

  .empty-state .hint {
    margin-top: 8px;
    font-size: 13px;
  }

  footer {
    text-align: center;
    padding: 32px 0 40px;
    border-top: 1px solid var(--border);
    color: var(--text-tertiary);
    font-size: 13px;
    font-weight: 500;
  }

  @media (max-width: 600px) {
    .hero { padding: 50px 0 40px; }
    .hero-mascot { width: 90px; height: 90px; }
    .game-grid { grid-template-columns: 1fr; gap: 16px; }
    .nav-links { gap: 16px; }
    .nav-links a { font-size: 13px; }
  }
</style>
</head>
<body>

  <div class="section-label"><span>Games</span></div>
